<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Argus</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900">
    <div class="mx-auto max-w-6xl px-4 py-10">
      <div class="mb-6 flex items-start justify-between gap-4">
        <div>
          <h1 class="text-2xl font-bold tracking-tight">Argus Incident Dashboard</h1>
          <p class="mt-1 text-sm text-slate-600">Recent incidents and approval requests</p>
        </div>
        <div class="rounded-xl bg-white px-4 py-3 shadow-sm ring-1 ring-slate-200">
          <p class="text-xs font-semibold uppercase tracking-wider text-slate-500">Mode</p>
          <p id="mode" class="mt-1 text-sm font-medium">—</p>
        </div>
      </div>

      <div class="rounded-2xl bg-white shadow-sm ring-1 ring-slate-200">
        <div class="flex items-center justify-between gap-4 border-b border-slate-100 px-6 py-4">
          <p class="text-sm font-semibold">Incidents</p>
          <div class="flex items-center gap-2">
            <button id="refresh" class="rounded-lg bg-slate-100 px-3 py-1.5 text-sm font-semibold text-slate-800 hover:bg-slate-200" type="button">Refresh</button>
          </div>
        </div>
        <div class="overflow-x-auto">
          <table class="min-w-full">
            <thead>
              <tr class="bg-slate-50 text-left text-xs font-semibold uppercase tracking-wider text-slate-500">
                <th class="py-3 pl-6 pr-4">ID</th>
                <th class="py-3 pr-4">App</th>
                <th class="py-3 pr-4">Region</th>
                <th class="py-3 pr-4">Health</th>
                <th class="py-3 pr-4">State</th>
                <th class="py-3 pr-4">Score</th>
                <th class="py-3 pr-4">Created</th>
                <th class="py-3 pr-6">Action</th>
              </tr>
            </thead>
            <tbody id="rows" class="divide-y divide-slate-100"></tbody>
          </table>
        </div>
      </div>

      <div id="toast" class="pointer-events-none fixed bottom-6 right-6 hidden max-w-md rounded-xl bg-slate-900 px-4 py-3 text-sm text-white shadow-lg"></div>

      <div id="modal" class="fixed inset-0 hidden items-center justify-center bg-black/40 p-4">
        <div class="w-full max-w-2xl rounded-2xl bg-white p-6 shadow-xl ring-1 ring-slate-200">
          <div class="flex items-start justify-between gap-4">
            <div>
              <h2 id="modalTitle" class="text-lg font-bold">Approval</h2>
              <p id="modalSubtitle" class="mt-1 text-sm text-slate-600">—</p>
            </div>
            <button id="closeModal" class="rounded-lg bg-slate-100 px-3 py-1.5 text-sm font-semibold text-slate-800 hover:bg-slate-200" type="button">Close</button>
          </div>

          <div class="mt-4 grid gap-4 sm:grid-cols-2">
            <div class="rounded-xl bg-slate-50 p-4 ring-1 ring-slate-200">
              <p class="text-xs font-semibold uppercase tracking-wider text-slate-500">Incident</p>
              <p id="modalIncident" class="mt-2 font-mono text-xs text-slate-700">—</p>
            </div>
            <div class="rounded-xl bg-slate-50 p-4 ring-1 ring-slate-200">
              <p class="text-xs font-semibold uppercase tracking-wider text-slate-500">Approval token</p>
              <p id="modalToken" class="mt-2 font-mono text-xs text-slate-700">—</p>
            </div>
          </div>

          <div class="mt-4 rounded-xl bg-slate-50 p-4 ring-1 ring-slate-200">
            <p class="text-xs font-semibold uppercase tracking-wider text-slate-500">Summary</p>
            <p id="modalSummary" class="mt-2 text-sm leading-6 text-slate-700">—</p>
          </div>

          <div class="mt-4 flex flex-wrap items-center justify-end gap-2">
            <button id="rejectBtn" class="rounded-lg bg-slate-100 px-4 py-2 text-sm font-semibold text-slate-800 hover:bg-slate-200" type="button">Reject</button>
            <button id="approveBtn" class="rounded-lg bg-emerald-600 px-4 py-2 text-sm font-semibold text-white hover:bg-emerald-700" type="button">Approve</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const elRows = document.getElementById('rows');
      const elMode = document.getElementById('mode');
      const elToast = document.getElementById('toast');
      const elModal = document.getElementById('modal');
      const elCloseModal = document.getElementById('closeModal');
      const elModalTitle = document.getElementById('modalTitle');
      const elModalSubtitle = document.getElementById('modalSubtitle');
      const elModalIncident = document.getElementById('modalIncident');
      const elModalToken = document.getElementById('modalToken');
      const elModalSummary = document.getElementById('modalSummary');
      const elApproveBtn = document.getElementById('approveBtn');
      const elRejectBtn = document.getElementById('rejectBtn');

      let currentApproval = null;

      function pill(text, cls) {
        return `<span class="inline-flex items-center rounded-full px-2 py-0.5 text-xs font-semibold ring-1 ring-inset ${cls}">${escapeHtml(text)}</span>`;
      }

      function badgeClass(status) {
        return {
          down: 'bg-red-100 text-red-800 ring-red-200',
          degraded: 'bg-amber-100 text-amber-800 ring-amber-200',
          healthy: 'bg-emerald-100 text-emerald-800 ring-emerald-200'
        }[status] || 'bg-sky-100 text-sky-800 ring-sky-200';
      }

      function stateClass(state) {
        return {
          awaiting_approval: 'bg-violet-100 text-violet-800 ring-violet-200',
          detected: 'bg-amber-100 text-amber-800 ring-amber-200',
          notified: 'bg-blue-100 text-blue-800 ring-blue-200',
          escalated: 'bg-red-100 text-red-800 ring-red-200',
          resolved: 'bg-emerald-100 text-emerald-800 ring-emerald-200',
          action_executed: 'bg-emerald-100 text-emerald-800 ring-emerald-200',
          approved: 'bg-emerald-100 text-emerald-800 ring-emerald-200'
        }[state] || 'bg-slate-100 text-slate-800 ring-slate-200';
      }

      function escapeHtml(s) {
        return String(s)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }

      function showToast(msg) {
        elToast.textContent = msg;
        elToast.classList.remove('hidden');
        setTimeout(() => elToast.classList.add('hidden'), 2500);
      }

      function openModal(approval, incident) {
        currentApproval = approval;
        elModalTitle.textContent = 'Failover approval';
        elModalSubtitle.textContent = `${incident.app_name} (${incident.region})`;
        elModalIncident.textContent = incident.id;
        elModalToken.textContent = approval.token;
        elModalSummary.innerHTML = escapeHtml(incident.summary || 'No summary available.').replaceAll('\n', '<br>');
        elModal.classList.remove('hidden');
        elModal.classList.add('flex');
      }

      function closeModal() {
        currentApproval = null;
        elModal.classList.add('hidden');
        elModal.classList.remove('flex');
      }

      async function api(path, opts = {}) {
        const resp = await fetch(path, {
          headers: { 'Content-Type': 'application/json' },
          ...opts,
        });
        const contentType = resp.headers.get('content-type') || '';
        const data = contentType.includes('application/json') ? await resp.json() : await resp.text();
        if (!resp.ok) {
          const msg = data && data.error ? data.error : `Request failed: ${resp.status}`;
          throw new Error(msg);
        }
        return data;
      }

      async function load() {
        const status = await api('/api/status');
        elMode.textContent = status.dry_run ? 'Dry run' : 'Live';

        const incidents = await api('/api/incidents?limit=50');
        if (!incidents.length) {
          elRows.innerHTML = `<tr><td colspan="8" class="py-10 text-center text-slate-400">No incidents yet.</td></tr>`;
          return;
        }

        elRows.innerHTML = incidents.map((inc) => {
          const health = pill(inc.health_status.toUpperCase(), badgeClass(inc.health_status));
          const state = pill(inc.state, stateClass(inc.state));
          const created = escapeHtml(inc.created_at);
          const score = `${Math.round(inc.health_score)}/100`;

          let action = `<span class="text-sm text-slate-400">—</span>`;
          if (inc.state === 'awaiting_approval' && inc.approval_available) {
            action = `
              <div class="flex flex-wrap items-center gap-2">
                <button data-action="review" data-incident="${escapeHtml(inc.id)}" class="rounded-lg bg-violet-600 px-3 py-1.5 text-sm font-semibold text-white hover:bg-violet-700" type="button">Review</button>
                <button data-action="approve" data-incident="${escapeHtml(inc.id)}" class="rounded-lg bg-emerald-600 px-3 py-1.5 text-sm font-semibold text-white hover:bg-emerald-700" type="button">Approve</button>
                <button data-action="reject" data-incident="${escapeHtml(inc.id)}" class="rounded-lg bg-slate-100 px-3 py-1.5 text-sm font-semibold text-slate-800 hover:bg-slate-200" type="button">Reject</button>
              </div>
            `;
          }

          return `
            <tr class="hover:bg-slate-50">
              <td class="whitespace-nowrap py-3 pl-6 pr-4 font-mono text-xs text-slate-500">${escapeHtml(inc.id.slice(0, 8))}</td>
              <td class="py-3 pr-4 font-medium">${escapeHtml(inc.app_name)}</td>
              <td class="whitespace-nowrap py-3 pr-4 text-slate-700">${escapeHtml(inc.region)}</td>
              <td class="whitespace-nowrap py-3 pr-4">${health}</td>
              <td class="whitespace-nowrap py-3 pr-4">${state}</td>
              <td class="whitespace-nowrap py-3 pr-4 text-sm text-slate-600">${escapeHtml(score)}</td>
              <td class="whitespace-nowrap py-3 pr-4 text-sm text-slate-600">${created}</td>
              <td class="whitespace-nowrap py-3 pr-6">${action}</td>
            </tr>
          `;
        }).join('');
      }

      elCloseModal.addEventListener('click', closeModal);
      document.getElementById('refresh').addEventListener('click', () => load().catch((e) => showToast(e.message)));

      elRows.addEventListener('click', async (e) => {
        const btn = e.target.closest('button[data-action]');
        if (!btn) return;

        const action = btn.getAttribute('data-action');
        const incidentId = btn.getAttribute('data-incident');

        try {
          if (action === 'review') {
            const approval = await api(`/api/incidents/${incidentId}/approval`);
            const incident = await api(`/api/incidents/${incidentId}`);
            openModal(approval, incident);
            return;
          }

          if (action === 'approve') {
            await api(`/api/incidents/${incidentId}/approve`, { method: 'POST' });
            showToast('Approved');
            await load();
            return;
          }

          if (action === 'reject') {
            await api(`/api/incidents/${incidentId}/reject`, { method: 'POST' });
            showToast('Rejected');
            await load();
            return;
          }
        } catch (err) {
          showToast(err.message || 'Action failed');
        }
      });

      elApproveBtn.addEventListener('click', async () => {
        if (!currentApproval) return;
        try {
          await api(`/api/approvals/${currentApproval.token}/approve`, { method: 'POST' });
          showToast('Approved');
          closeModal();
          await load();
        } catch (e) {
          showToast(e.message);
        }
      });

      elRejectBtn.addEventListener('click', async () => {
        if (!currentApproval) return;
        try {
          await api(`/api/approvals/${currentApproval.token}/reject`, { method: 'POST' });
          showToast('Rejected');
          closeModal();
          await load();
        } catch (e) {
          showToast(e.message);
        }
      });

      async function handleTokenFromUrl() {
        const match = window.location.hash.match(/approve=([^&]+)/);
        if (!match) return;
        const token = decodeURIComponent(match[1]);
        try {
          const approval = await api(`/api/approvals/${token}`);
          const incident = await api(`/api/incidents/${approval.incident_id}`);
          openModal(approval, incident);
        } catch (e) {
          showToast(e.message);
        }
      }

      load().then(handleTokenFromUrl).catch((e) => showToast(e.message));
    </script>
  </body>
</html>
